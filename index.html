<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Président | 6ème 6 San-Pédro</title>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6B00;
      --orange2: #FF9A3C;
      --green: #00A86B;
      --dark: #0D1117;
      --dark2: #161B22;
      --card: #1C2433;
      --text: #F0F4F8;
      --muted: #8899AA;
      --gold: #FFD700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== BG PATTERN ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(255,107,0,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0,168,107,0.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      padding: 28px 20px 20px;
      position: relative;
    }

    .header-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: white;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Dela Gothic One', cursive;
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, var(--orange2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .header p {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .flag-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 14px;
    }

    .flag-bar span {
      width: 32px;
      height: 6px;
      border-radius: 3px;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      margin: 16px 16px 0;
      background: var(--dark2);
      border-radius: 16px;
      padding: 4px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--muted);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: white;
      box-shadow: 0 4px 15px rgba(255,107,0,0.35);
    }

    /* ===== SECTION ===== */
    .section {
      padding: 16px;
    }

    /* ===== PHONE INPUT ===== */
    .phone-box {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .phone-box label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange2);
      margin-bottom: 10px;
    }

    .phone-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--dark2);
      border-radius: 14px;
      padding: 12px 16px;
      border: 2px solid rgba(255,255,255,0.06);
      transition: border-color 0.2s;
    }

    .phone-input-wrap:focus-within {
      border-color: var(--orange);
    }

    .phone-flag {
      font-size: 20px;
    }

    .phone-input-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .phone-input-wrap input::placeholder {
      color: var(--muted);
      font-weight: 600;
    }

    /* ===== CANDIDATES ===== */
    .candidates-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange2);
      margin-bottom: 12px;
    }

    .candidate-card {
      background: var(--card);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 2px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .candidate-card:active {
      transform: scale(0.98);
    }

    .candidate-card.selected {
      border-color: var(--orange);
      background: linear-gradient(135deg, rgba(255,107,0,0.12), rgba(255,154,60,0.05));
      box-shadow: 0 0 24px rgba(255,107,0,0.2);
    }

    .candidate-emoji {
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--dark2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .candidate-card.selected .candidate-emoji {
      background: rgba(255,107,0,0.15);
    }

    .candidate-info {
      flex: 1;
    }

    .candidate-name {
      font-size: 15px;
      font-weight: 800;
    }

    .candidate-slogan {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 2px;
    }

    .candidate-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .candidate-card.selected .candidate-check {
      background: var(--orange);
      border-color: var(--orange);
    }

    /* ===== VOTE BUTTON ===== */
    .vote-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Dela Gothic One', cursive;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(255,107,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .vote-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .vote-btn:not(:disabled):active {
      transform: scale(0.97);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 14px;
      z-index: 999;
      animation: toastIn 0.3s ease;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,168,107,0.4);
    }

    .toast.error {
      background: #E53E3E;
      box-shadow: 0 8px 24px rgba(229,62,62,0.4);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ===== RESULTS ===== */
    .results-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .total-votes {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .total-votes .num {
      font-family: 'Dela Gothic One', cursive;
      font-size: 36px;
      line-height: 1;
    }

    .total-votes .label {
      font-size: 12px;
      font-weight: 700;
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .result-card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .result-card.winner {
      border-color: var(--gold);
      background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,107,0,0.05));
    }

    .result-rank {
      position: absolute;
      top: 12px;
      right: 14px;
      font-family: 'Dela Gothic One', cursive;
      font-size: 28px;
      opacity: 0.1;
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-emoji {
      font-size: 24px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--dark2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-name {
      font-weight: 800;
      font-size: 15px;
    }

    .result-votes {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 2px;
    }

    .result-pct {
      margin-left: auto;
      font-family: 'Dela Gothic One', cursive;
      font-size: 22px;
      color: var(--orange2);
    }

    .result-card.winner .result-pct {
      color: var(--gold);
    }

    .progress-bar {
      height: 8px;
      background: var(--dark2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      transition: width 0.8s ease;
    }

    .result-card.winner .progress-fill {
      background: linear-gradient(90deg, var(--gold), #FFA500);
    }

    .winner-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--gold);
      color: #000;
      font-size: 10px;
      font-weight: 900;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,107,0,0.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = 'http://localhost:5000/api';

function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, [onClose]);
  return <div className={`toast ${type === 'error' ? 'error' : ''}`}>{message}</div>;
}

function VoteTab() {
  const [phone, setPhone] = useState('');
  const [selected, setSelected] = useState(null);
  const [candidates, setCandidates] = useState([]);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    fetch(`${API}/candidates`)
      .then(r => r.json())
      .then(setCandidates)
      .catch(() => setToast({ message: 'Impossible de charger les candidats', type: 'error' }));
  }, []);

  const showToast = (message, type = 'success') => {
    setToast({ message, type });
  };

  const handleVote = async () => {
    if (!phone || !selected) return;
    setLoading(true);
    try {
      const res = await fetch(`${API}/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telephone: phone, candidate_id: selected })
      });
      const data = await res.json();
      if (res.ok) {
        showToast('✅ ' + data.message);
        setPhone('');
        setSelected(null);
      } else {
        showToast('⚠️ ' + data.error, 'error');
      }
    } catch {
      showToast('❌ Erreur de connexion au serveur', 'error');
    }
    setLoading(false);
  };

  const canVote = phone.length >= 8 && selected !== null;

  return (
    <div className="section">
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

      <div className="phone-box">
        <label>📱 Votre numéro de téléphone</label>
        <div className="phone-input-wrap">
          <span className="phone-flag">🇨🇮</span>
          <input
            type="tel"
            placeholder="07 00 00 00 00"
            value={phone}
            onChange={e => setPhone(e.target.value.replace(/[^0-9 ]/g, ''))}
            maxLength={14}
          />
        </div>
      </div>

      <p className="candidates-label">🗳️ Choisissez votre candidat</p>

      {candidates.map(c => (
        <div
          key={c.id}
          className={`candidate-card ${selected === c.id ? 'selected' : ''}`}
          onClick={() => setSelected(c.id)}
        >
          <div className="candidate-emoji">{c.emoji}</div>
          <div className="candidate-info">
            <div className="candidate-name">{c.nom}</div>
            <div className="candidate-slogan">"{c.slogan}"</div>
          </div>
          <div className="candidate-check">
            {selected === c.id && <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6L5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round"/>
            </svg>}
          </div>
        </div>
      ))}

      <button
        className="vote-btn"
        disabled={!canVote || loading}
        onClick={handleVote}
      >
        {loading ? '⏳ Envoi...' : '🗳️ VOTER MAINTENANT'}
      </button>
    </div>
  );
}

function ResultsTab() {
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(true);

  const fetchResults = useCallback(() => {
    setLoading(true);
    fetch(`${API}/results`)
      .then(r => r.json())
      .then(data => { setResults(data); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { fetchResults(); }, [fetchResults]);

  if (loading) return (
    <div className="section loading">
      <div className="spinner"></div>
      Chargement des résultats...
    </div>
  );

  if (!results) return (
    <div className="section loading">
      <p>Impossible de charger les résultats</p>
      <button className="refresh-btn" onClick={fetchResults}>Réessayer</button>
    </div>
  );

  return (
    <div className="section">
      <div className="total-votes">
        <div className="num">{results.total_votes}</div>
        <div className="label">votes enregistrés</div>
      </div>

      {results.candidates.map((c, i) => (
        <div key={c.id} className={`result-card ${i === 0 && c.votes > 0 ? 'winner' : ''}`}>
          <div className="result-rank">#{i + 1}</div>
          <div className="result-top">
            <div className="result-emoji">{c.emoji}</div>
            <div>
              <div className="result-name">
                {c.nom}
                {i === 0 && c.votes > 0 && <span className="winner-badge">👑 En tête</span>}
              </div>
              <div className="result-votes">{c.votes} vote{c.votes !== 1 ? 's' : ''}</div>
            </div>
            <div className="result-pct">{c.percentage}%</div>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${c.percentage}%` }}></div>
          </div>
        </div>
      ))}

      <br/>
      <button className="refresh-btn" onClick={fetchResults}>
        🔄 Actualiser les résultats
      </button>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('vote');

  return (
    <div>
      <div className="header">
        <div className="header-badge">ÉLECTION 2025</div>
        <h1>Vote Président<br/>de Promotion</h1>
        <p>6ème 6 — Lycée San-Pédro</p>
        <div className="flag-bar">
          <span style={{ background: '#F77F00' }}></span>
          <span style={{ background: '#FFFFFF' }}></span>
          <span style={{ background: '#009A44' }}></span>
        </div>
      </div>

      <div className="tabs">
        <button
          className={`tab ${tab === 'vote' ? 'active' : ''}`}
          onClick={() => setTab('vote')}
        >
          🗳️ Voter
        </button>
        <button
          className={`tab ${tab === 'results' ? 'active' : ''}`}
          onClick={() => setTab('results')}
        >
          📊 Résultats
        </button>
      </div>

      {tab === 'vote' ? <VoteTab /> : <ResultsTab />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
